<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test-form</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap');

        body{
            font-family: "Noto Sans Thai", sans-serif;
            }
    </style>
</head>
<body>
    <h1>Food</h1>
    <form action="/api/order" method="post">
        <label for="">
            Input Name <input id="input-name" type="text" name="input-name" required>
        </label>
        <p>Soup Type</p>
        <label for="">Mala Milk
            <input type="radio" name="malamilk" name="soup" value="malamilk">
        </label>
        <label for="">Mala
            <input type="radio" name="mala" name="soup" value="mala">
        </label>
        <label for="">Pork
            <input type="radio" name="pork-soup" name="soup" value="pork-soup">
        </label>
        <button type="submit">submit</button>
    </form>
</body>
</html>
