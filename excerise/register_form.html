<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register-form</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap');

        body{
            font-family: "Noto Sans Thai", sans-serif;
            }
    </style>
</head>
<body>
    <form action="/api/Register" method="post">
            <h1>Register</h1>
            <p>Please fill username, email, and password</p>
            <hr>

            <label for="username"><b>Username:</b></label>
            <input type="text" placeholder="Enter Username" id="username" name="username" required>

            <label for="email"><b>Email:</b></label>
            <input type="text" placeholder="Enter Email" name="email" id="email" required>

            <label for="psw"><b>Password:</b></label>
            <input type="password" placeholder="Enter Password" name="password" id="psw" required>

            <h3>Package</h3>
            <label for="premium">Premium</label>
            <input type="radio" name="package-type" id="premium">
            <label for="free">Free</label>
            <input type="radio" name="package-type" id="free">
            <br>
            <label for="">ดูหนัง</label>
            <input type="checkbox" name="hobbies" value="movie">
            <label for="">ฟังเพลง</label>
            <input type="checkbox" name="hobbies" value="music">
            <label for="">เล่นเกม</label>
            <input type="checkbox" name="hobbies" value="games">

            <button type="submit">Submit</button>

    </form>
</body>
</html>
